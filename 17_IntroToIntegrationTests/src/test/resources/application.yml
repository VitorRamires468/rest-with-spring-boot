server:
  port: 8888
spring:
  application:
    name: rest-with-spring
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        show-sql: false
        open-in-view: false
logging:
  level:
    #root: WARN  aplica o nivel de log de forma global
    br.con.vitorramires468: DEBUG

spring.doc:
  paths-to-match: /api/**/v1/**
  swagger-ui:
    use-root-path: true